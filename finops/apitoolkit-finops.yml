specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: APIToolkit (Monoscope)
providerId: apitoolkit
publisherName: Monoscope
serviceCategory: Observability / Developer Tools
created: '2026-05-04'
modified: '2026-05-22'
tags:
  - AI Observability
  - API Monitoring
  - Cost Management
  - FOCUS
  - FinOps
  - Observability
  - OpenTelemetry
description: >-
  FinOps framework definition for the APIToolkit / Monoscope offering. The
  service is priced per ingested event with a $1 per 1M events overage rate
  across both Cloud tiers, plus subscription line items. Self-hosted is BYO
  infrastructure with $0 (community) or $500+/month (enterprise) license.
principles:
  - name: Visibility
    description: Track event ingestion (logs/traces/metrics/errors) per project, service, and team.
  - name: Allocation
    description: Tag spans, logs, and metrics with team, environment, application, and feature for chargeback.
  - name: Optimization
    description: Tune sampling, retention, and SDK redaction to keep cost per useful event low.
  - name: Accountability
    description: Set per-project event budgets aligned to the $29/$199 included allowances.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Monoscope
  ServiceCategory: Observability / Developer Tools
  ProviderName: Monoscope
  PublisherName: Monoscope
  InvoiceIssuerName: Monoscope
  PricingCategory: Usage-Based
  PricingUnit: 1M events
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: events_ingested
    description: Total events (logs + traces + metrics + errors) ingested per month.
    unit: event
    aggregation: sum
    dimensions:
      - project
      - service
      - environment
      - team
      - source
  - name: event_overage
    description: Events above the tier-included allowance, billed per 1M.
    unit: 1M events
    aggregation: sum
    dimensions:
      - project
      - tier
  - name: api_requests
    description: REST API calls against api.monoscope.tech/api/v1.
    unit: request
    aggregation: sum
    dimensions:
      - project
      - endpoint
      - api_key
  - name: retention_days
    description: Days of retained event data.
    unit: day
    aggregation: max
    dimensions:
      - project
      - tier
apis:
  - name: Monoscope Platform API
    baseURL: https://api.monoscope.tech/api/v1
    tags:
      - API Monitoring
      - Observability
      - Metrics
      - Monitors
    serviceName: Monoscope Platform
    serviceCategory: Observability
unitEconomics:
  - name: Cost per 1M Events
    metric: billed_cost / (events_ingested / 1000000)
    target: '1.00'
  - name: Cost per Active Project
    metric: billed_cost / active_projects
    target: TBD
  - name: Ingestion Cost Ratio
    metric: event_overage_cost / subscription_cost
    target: less-than-1
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
