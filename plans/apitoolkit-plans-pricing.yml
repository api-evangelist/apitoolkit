specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: APIToolkit (Monoscope)
providerId: apitoolkit
created: '2026-05-04'
modified: '2026-05-22'
tags:
  - AI Observability
  - API Analytics
  - API Monitoring
  - Error Tracking
  - Logs and Traces
  - MCP Server
  - Metrics
  - Monitors
  - Observability
  - OpenTelemetry
  - Session Replay
description: >-
  Machine-readable plans and pricing for the APIToolkit / Monoscope offering.
  Pricing is event-based: each tier includes a monthly event allowance and
  charges $1 per additional 1M events. The Self-Hosted Community Edition is
  free forever, and the Self-Hosted Enterprise Edition is priced from
  $500/month. Source: https://monoscope.tech/pricing/
plans:
  - id: monoscope-cloud
    name: Monoscope Cloud
    type: paid
    description: >-
      Hosted Monoscope with included event allowance and unlimited team seats.
      Includes community and email support, 30-day data retention.
    entries:
      - label: Base Subscription
        description: Monthly base fee for Monoscope Cloud.
        name: subscription
        type: subscription
        metric: subscription
        limit: 1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '29.00'
        userMultiplied: false
      - label: Included Events
        description: Events (logs, traces, metrics, errors) included per month.
        name: included_events
        type: quota
        metric: events
        limit: 20000000
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Event Overage
        description: Per-1M-events price beyond the included allowance.
        name: event_overage
        type: metered
        metric: events
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 1000000
        price: '1.00'
        userMultiplied: false
      - label: Data Retention
        description: Days of data retention.
        name: retention
        type: feature
        metric: days
        limit: 30
        timeFrame: rolling
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Unlimited Team Seats
      - name: 30-Day Retention
      - name: Community + Email Support
      - name: Hosted MCP Server
      - name: All Native SDKs
      - name: AI-Powered Natural Language Query
      - name: Session Replay
  - id: monoscope-cloud-s3
    name: Monoscope Cloud + Your Own S3
    type: paid
    description: >-
      Hosted Monoscope with bring-your-own S3 bucket for unlimited retention,
      higher event allowance, and priority support.
    entries:
      - label: Base Subscription
        description: Monthly base fee for Cloud + Your Own S3.
        name: subscription
        type: subscription
        metric: subscription
        limit: 1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '199.00'
        userMultiplied: false
      - label: Included Events
        description: Events included per month.
        name: included_events
        type: quota
        metric: events
        limit: 100000000
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Event Overage
        description: Per-1M-events price beyond the included allowance.
        name: event_overage
        type: metered
        metric: events
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 1000000
        price: '1.00'
        userMultiplied: false
      - label: Data Retention
        description: Unlimited retention via customer-owned S3 bucket.
        name: retention
        type: feature
        metric: days
        limit: -1
        timeFrame: rolling
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Unlimited Retention (BYO S3)
      - name: Unlimited Team Seats
      - name: Priority Support
      - name: Hosted MCP Server
      - name: All Native SDKs
      - name: AI-Powered Natural Language Query
      - name: Session Replay
  - id: monoscope-self-hosted-community
    name: Self-Hosted Community Edition
    type: free
    description: >-
      Free, AGPL-3.0 self-hosted Monoscope. Unlimited events and seats; custom
      retention; community support.
    entries:
      - label: License Fee
        description: Free forever.
        name: license
        type: subscription
        metric: subscription
        limit: 1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Events
        description: Unlimited self-hosted event ingestion.
        name: events
        type: quota
        metric: events
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: AGPL-3.0 License
      - name: Unlimited Events
      - name: Unlimited Team Seats
      - name: Custom Retention
      - name: Community Support
      - name: Self-Hosted MCP Server
  - id: monoscope-self-hosted-enterprise
    name: Self-Hosted Enterprise Edition
    type: enterprise
    description: >-
      Commercial self-hosted Monoscope from $500/month with custom SLA and
      enterprise support.
    entries:
      - label: Base Subscription
        description: Starts at $500/month; contact sales for exact pricing.
        name: subscription
        type: subscription
        metric: subscription
        limit: 1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '500.00'
        userMultiplied: false
      - label: Events
        description: Unlimited self-hosted event ingestion.
        name: events
        type: quota
        metric: events
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Commercial License
      - name: Custom SLA
      - name: Enterprise Support
      - name: Unlimited Events
      - name: Unlimited Team Seats
      - name: Custom Retention
      - name: Single Sign-On (SSO)
maintainers:
