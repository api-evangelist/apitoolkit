apiVersion: naftiko.dev/v1
kind: SharedCapability
metadata:
  name: monoscope-platform-shared
  api: monoscope-platform
spec:
  description: Shared connection and auth definitions reused by Monoscope workflows.
  connection:
    baseUrl: https://api.monoscope.tech/api/v1
    headers:
      Authorization: Bearer ${secrets.MONOSCOPE_API_KEY}
  defaults:
    projectId: ${context.projectId}
  rateLimits:
    free: 60/minute
    pro: 300/minute
    enterprise: custom
